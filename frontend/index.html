<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="G8 Yacht Villa operations system for frontdesk, sales, dining, rooms, service points, and administration." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      (() => {
        let savedTheme;
        try {
          savedTheme = localStorage.getItem('g8_theme');
        } catch {
          savedTheme = null;
        }
        const validSavedTheme = savedTheme === 'light' || savedTheme === 'dark';
        const isDark = validSavedTheme
          ? savedTheme === 'dark'
          : matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', isDark);
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>
    <title>G8 Yacht Villa Operations</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
